version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aeneas
      POSTGRES_USER: aeneas
      POSTGRES_PASSWORD: aeneas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeneas"]
      interval: 5s
      timeout: 5s
      retries: 5

  aeneas:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AENEAS_PORT: "8080"
      AENEAS_LOG_LEVEL: "info"
      AENEAS_DB_HOST: "postgres"
      AENEAS_DB_PORT: "5432"
      AENEAS_DB_NAME: "aeneas"
      AENEAS_DB_USER: "aeneas"
      AENEAS_DB_PASSWORD: "aeneas_dev"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Note: scratch image has no shell/wget - using external check instead

volumes:
  postgres_data:
